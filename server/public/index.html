<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Felt — Blackjack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="table">

        <!-- Dealer placard -->
        <header id="table-header">
            <div id="dealer-id">
                <span id="dealer-name">Maria</span>
                <span id="dealer-title">Dealer · Table 7</span>
            </div>
            <div id="shoe-info">
                <span id="shoe-count">312</span>
                <span class="shoe-label">cards in shoe</span>
            </div>
        </header>

        <!-- Dealer's line — gives the dealer a voice -->
        <p id="dealer-line">Pull up a seat whenever you're ready.</p>

        <!-- Dealer zone -->
        <section class="zone" id="dealer-zone">
            <div class="zone-label">
                <span>Dealer</span>
                <span id="dealer-score" class="score-chip score-chip--hidden">—</span>
            </div>
            <div id="dealer-cards" class="card-row" aria-live="polite"></div>
        </section>

        <div class="felt-divider"><span></span></div>

        <!-- Player zone -->
        <section class="zone" id="player-zone">
            <div class="zone-label">
                <span>You</span>
                <span id="player-score" class="score-chip">—</span>
            </div>
            <div id="player-cards" class="card-row" aria-live="polite"></div>
        </section>

        <!-- Outcome banner -->
        <div id="outcome-banner" class="hidden">
            <span id="outcome-text"></span>
        </div>

        <!-- Rail of controls -->
        <footer id="rail">
            <button id="new-game-btn" class="rail-btn rail-btn--primary">Sit Down</button>
            <button id="deal-btn" class="rail-btn rail-btn--primary hidden">Deal</button>
            <button id="hit-btn" class="rail-btn hidden" disabled>Hit</button>
            <button id="stand-btn" class="rail-btn hidden" disabled>Stand</button>
            <button id="next-hand-btn" class="rail-btn rail-btn--primary hidden">Next Hand</button>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
