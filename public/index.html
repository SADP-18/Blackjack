<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
      
    <!--main game container-->
    <div id="game container">
        <div id="header">
            <h1>Black Jack Game Engine</h1>
        </div>
        <!--Game status-->
        <div id="game-status">
            <h2 id="status-message"> Welcome! start new game</h2>
        </div>

        <!--Dealer section -->
        <div id="sealer-section">
            <h3>DEALER</h3>
            <div id="dealer-cards" class="card-container">
                <!--(Later) Dealer cards will be located here-->
            </div>
            <div id="dealer-score">Score: ?</div>
        </div>

        <!--Player Section-->
        <div id="player-section">
            <h3>PLAYER</h3>
        <div id="player-cards" class="card-container">
            <!--Player cards will be located here-->
        </div>
        <div id="player-score">Score: 0</div>
        </div>

        <!--GAme Controls-->
        <div id="controls">
            <button id="new-game-btn">New Game</button>
            <button id="hit-btn" disabled>Hit</button>
            <button id="stand-btn" disabled>Stand</button>
        </div>

        <!--Game messages-->
        <div id="message-area">
            <p id="game-message"> Click "New Game" to start playing!</p>
        </div>

        <!--Debug Info-->
        <div id="debug-info" style="display: none;">
            <h4>Debug Info:</h4>
            <p id="game-id">Game ID: -</p>
            <p id="deck-count">Cards remaining : 52</p>
        </div>
    </div>

</body>
</html>
